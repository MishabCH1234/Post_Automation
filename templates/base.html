<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insta Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-indigo-600">InstaAI</h1>

    <div class="space-x-4">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-indigo-600">Dashboard</a>
            <a href="{% url 'upload_plan' %}" class="text-gray-600 hover:text-indigo-600">Upload</a>
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="text-red-500">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="text-gray-600 hover:text-indigo-600">Login</a>
        {% endif %}
    </div>
</nav>

<!-- MAIN -->
<div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white shadow-md min-h-screen hidden md:block">
        <ul class="p-4 space-y-3">
            <li><a href="{% url 'dashboard' %}" class="block p-2 rounded hover:bg-indigo-100">Dashboard</a></li>
            <li><a href="{% url 'upload_plan' %}" class="block p-2 rounded hover:bg-indigo-100">Upload Plan</a></li>
            <li><a href="{% url 'profile' %}" class="block p-2 rounded hover:bg-indigo-100">Profile</a></li>
        </ul>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 p-6">
        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="bg-white border-l-4 border-indigo-600 p-3 shadow">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
