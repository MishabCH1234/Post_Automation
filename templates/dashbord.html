{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<!-- STATS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="text-gray-500">Total Posts</h3>
        <p class="text-2xl font-bold">{{ posts|length }}</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="text-gray-500">Scheduled</h3>
        <p class="text-2xl font-bold">{{ scheduled_count }}</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="text-gray-500">Posted</h3>
        <p class="text-2xl font-bold">{{ posted_count }}</p>
    </div>

</div>

<!-- TABLE -->
<div class="bg-white shadow rounded-xl overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-gray-200">
            <tr>
                <th class="p-3">Title</th>
                <th>Status</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody>
            {% for post in posts %}
            <tr class="border-t">
                <td class="p-3">{{ post.title }}</td>
                <td>
                    <span class="px-2 py-1 rounded text-white
                        {% if post.status == 'posted' %}
                            bg-green-500
                        {% else %}
                            bg-yellow-500
                        {% endif %}
                    ">
                        {{ post.status }}
                    </span>
                </td>
                <td>{{ post.scheduled_time }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
