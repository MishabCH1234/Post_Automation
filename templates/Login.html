<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Insta Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

        {% if form.errors %}
            <div class="mb-4 text-sm text-red-600">Please enter a valid username and password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <input type="text" name="username" placeholder="Username" class="w-full mb-4 p-2 border rounded" autofocus>
            <input type="password" name="password" placeholder="Password" class="w-full mb-4 p-2 border rounded">

            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded">
                Login
            </button>
        </form>
    </div>
</body>
</html>
