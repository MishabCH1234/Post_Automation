<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InstaAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
    <main class="w-full max-w-sm bg-white rounded shadow p-8">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">InstaAI Login</h1>

        {% if form.errors %}
            <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                Please enter a valid username and password.
            </div>
        {% endif %}

        {% if next %}
            <div class="mb-4 rounded border border-indigo-200 bg-indigo-50 p-3 text-sm text-indigo-700">
                Please log in to continue.
            </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    autocomplete="username"
                    required
                    autofocus
                    class="w-full rounded border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"
                >
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    autocomplete="current-password"
                    required
                    class="w-full rounded border border-gray-300 px-3 py-2 focus:border-indigo-500 focus:outline-none"
                >
            </div>

            <button type="submit" class="w-full rounded bg-indigo-600 px-4 py-2 font-semibold text-white hover:bg-indigo-700">
                Login
            </button>
        </form>
    </main>
</body>
</html>
